name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_PLATFORM: latest
      SDK_PLATFORM: android-36

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK platform
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;$SDK_PLATFORM"

      - name: Remove all other platforms and ext platforms
        run: |
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -type d -name 'android-*' ! -name "$SDK_PLATFORM" -exec rm -rf {} \;
          find $ANDROID_SDK_ROOT/platforms -maxdepth 1 -type d -name '*ext*' -exec rm -rf {} \;
          echo "Remaining platforms:"
          ls $ANDROID_SDK_ROOT/platforms

      - name: Install Qt for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          target: 'android'
          arch: 'android_arm64_v8a'
          cache: true

      - name: Configure project
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          qt-cmake -GNinja -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_SDK_ROOT=$ANDROID_SDK_ROOT \
            -DANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME \
            -DANDROID_PLATFORM=$ANDROID_PLATFORM \
            -B build .

      - name: Prepare gradle.properties to suppress checks
        run: |
          mkdir -p build/android-build
          cat > build/android-build/gradle.properties <<EOF
          android.suppressUnsupportedCompileSdk=36
          android.disableResourceValidation=true
          EOF

      - name: Build APK
        run: |
          export ANDROID_NDK_ROOT=$ANDROID_NDK_LATEST_HOME
          cmake --build build --target apk --parallel $(nproc)

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: polygon-chart-apk
          path: build/android-build/build/outputs/apk/release/*.apk